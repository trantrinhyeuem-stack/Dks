<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>chao chao???</title>

<style>
body {
  background: #0d1117;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  font-family: Arial, sans-serif;
}

/* khung cầu vồng */
.rainbow-frame {
  padding: 10px;
  border-radius: 25px;
  background: linear-gradient(
    270deg,
    red,
    orange,
    yellow,
    lime,
    cyan,
    blue,
    violet,
    red
  );
  background-size: 400%;
  animation: rainbowMove 6s linear infinite;

  box-shadow:
    0 0 15px red,
    0 0 30px orange,
    0 0 45px yellow,
    0 0 60px cyan,
    0 0 75px blue,
    0 0 90px violet;
}

/* ảnh responsive mobile */
.rainbow-frame img {
  display: block;
  width: 90vw;
  max-width: 500px;
  border-radius: 20px;
}

/* nút download */
.download-btn {
  margin-top: 20px;
  padding: 14px 30px;
  font-size: 18px;
  color: white;
  text-decoration: none;
  border-radius: 15px;

  background: linear-gradient(
    270deg,
    red,
    orange,
    yellow,
    lime,
    cyan,
    blue,
    violet,
    red
  );
  background-size: 400%;

  animation: rainbowMove 6s linear infinite;

  box-shadow: 0 0 15px cyan;
}

.download-btn:active {
  transform: scale(0.95);
}

/* animation */
@keyframes rainbowMove {
  0% { background-position: 0% }
  100% { background-position: 400% }
}

</style>

</head>
<body>

<div class="rainbow-frame">
  <img src="ảnh/von/Chinese 02003917.jpg">
</div>

<a class="download-btn"
   href="ảnh/von/Chinese 02003917.jpg"
   download>
   Download
</a>

</body>
</html>
