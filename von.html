<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>chao chao ư ?!!?</title>

<style>
body {
  background: #0d1117;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: white;
  font-family: Arial;
}

/* khung cầu vồng */
.rainbow-frame {
  padding: 8px;
  border-radius: 20px;
  background: linear-gradient(
    270deg,
    red,
    orange,
    yellow,
    lime,
    cyan,
    blue,
    violet,
    red
  );
  background-size: 400%;
  animation: rainbowMove 6s linear infinite;

  box-shadow:
    0 0 10px red,
    0 0 20px orange,
    0 0 30px yellow,
    0 0 40px cyan,
    0 0 50px blue,
    0 0 60px violet;
}

.rainbow-frame img {
  display: block;
  width: 300px;
  border-radius: 15px;
}

@keyframes rainbowMove {
  0% { background-position: 0% }
  100% { background-position: 400% }
}

/* nút quay lại */
.back {
  margin-top: 20px;
  padding: 10px 20px;
  background: #238636;
  border-radius: 10px;
  color: white;
  text-decoration: none;
}
</style>

</head>
<body>

<h2>gần giống chao chao</h2>

<div class="rainbow-frame">
  <img src="ảnh/von/Chinese 02003917.jpg">
</div>

</body>
</html>
